server:
  public_base_url: http://localhost:8000

storage:
  backend: s3
  bucket: reconstruction
  endpoint: http://minio:9000
  access_key_env: S3_ACCESS_KEY
  secret_key_env: S3_SECRET_KEY

database:
  url_env: DATABASE_URL

redis:
  url_env: REDIS_URL

operators:
  colmap:
    enabled: true
    binary: /usr/bin/colmap
    queue: colmap
    local_feature_matching:
      enabled: true
      queue: gpu
      python: python3
      wrapper: /app/backend/app/operators/algorithms/local_feature_matching.py
      lightglue_repo_path: /opt/LightGlue
      lightglue_checkpoint: /app/models/dynamic/aliked_lightglue.pth
      aliked_repo_path: /opt/ALIKED
      aliked_checkpoint: /opt/ALIKED/models/aliked-n16rot.pth
      aliked_model: aliked-n16rot
      device: auto
      max_images: 300
      max_pairs: 12000
      pair_window: 512
      max_num_keypoints: 2048
      min_matches: 15
      strong_match_min: 100
      required_paths:
        - /app/backend/app/operators/algorithms/local_feature_matching.py
        - /opt/LightGlue/lightglue/__init__.py
        - /opt/LightGlue/lightglue/aliked.py
        - /opt/ALIKED/nets/aliked.py
        - /opt/ALIKED/models/aliked-n16rot.pth
        - /app/models/dynamic/aliked_lightglue.pth
      command:
        - "{python}"
        - "{matching_wrapper}"
        - "--images-dir"
        - "{images_dir}"
        - "--output-report"
        - "{output_report}"
        - "--lightglue-repo"
        - "{lightglue_repo_path}"
        - "--lightglue-checkpoint"
        - "{lightglue_checkpoint}"
        - "--aliked-repo"
        - "{aliked_repo_path}"
        - "--aliked-checkpoint"
        - "{aliked_checkpoint}"
        - "--aliked-model"
        - "{aliked_model}"
        - "--device"
        - "{device}"
        - "--max-images"
        - "{max_images}"
        - "--max-pairs"
        - "{max_pairs}"
        - "--pair-window"
        - "{pair_window}"
        - "--max-num-keypoints"
        - "{max_num_keypoints}"
        - "--min-matches"
        - "{min_matches}"
        - "--image-order-manifest"
        - "{image_order_manifest}"
        - "--output-colmap-features-dir"
        - "{colmap_features_dir}"
        - "--output-colmap-match-list"
        - "{colmap_match_list_path}"

  instantsplatpp:
    enabled: true
    repo_path: /opt/InstantSplatPP
    python: python3
    queue: instantsplatpp
    n_views: 0
    infer_video_when_n_views_covers_inputs: true
    iterations: 3000
    resolution: 1
    required_files:
      - init_geo.py
      - train.py
    init_command:
      - "{python}"
      - "init_geo.py"
      - "-s"
      - "{dataset_dir}"
      - "-m"
      - "{output_dir}"
      - "--n_views"
      - "{n_views}"
      - "--ckpt_path"
      - "{checkpoint}"
      - "--focal_avg"
      - "--co_vis_dsp"
      - "--conf_aware_ranking"
    train_command:
      - "{python}"
      - "train.py"
      - "-s"
      - "{dataset_dir}"
      - "-m"
      - "{output_dir}"
      - "-r"
      - "{resolution}"
      - "--n_views"
      - "{n_views}"
      - "--iterations"
      - "{iterations}"
      - "--pp_optimizer"
      - "--optim_pose"
    init_images_txt_path: "{dataset_dir}/sparse_{n_views}/0/images.txt"
    camera_mapping_path: "{output_dir}/cameras.json"
    output_ply_path: "{output_dir}/point_cloud/iteration_{iterations}/point_cloud.ply"
    training_config_path: "{output_dir}/cfg_args"
    checkpoints:
      vggt: /app/models/vggt/model.pt
      mast3r: /opt/InstantSplatPP/mast3r/checkpoints/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth

  mast3r_sfm:
    enabled: true
    repo_path: /opt/mast3r
    code_root: /opt/InstantSplatPP
    python: python3
    queue: gpu
    checkpoint: /opt/InstantSplatPP/mast3r/checkpoints/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth
    wrapper: /opt/mast3r/field_splat_mast3r_sfm.py
    command:
      - "{python}"
      - "{wrapper}"
      - "--images"
      - "{images_dir}"
      - "--checkpoint"
      - "{checkpoint}"
      - "--output"
      - "{output_dir}"
      - "--transforms"
      - "{transforms_path}"
      - "--camera-trajectory"
      - "{camera_trajectory_path}"
      - "--sparse-point-cloud"
      - "{sparse_point_cloud_path}"
      - "--registration-report"
      - "{registration_report_path}"
      - "--code-root"
      - "{code_root}"
    transforms_path: "{output_dir}/transforms.json"
    camera_trajectory_path: "{output_dir}/camera_trajectory.json"
    sparse_point_cloud_path: "{output_dir}/sparse_point_cloud.ply"
    registration_report_path: "{output_dir}/registration_report.json"

  semantic_masking:
    enabled: true
    queue: gpu
    python: python3
    wrapper: /app/backend/app/operators/algorithms/semantic_mask.py
    grounded_sam2_repo_path: /opt/Grounded-SAM-2
    sam2_repo_path: /opt/sam2
    sam2_config: /opt/Grounded-SAM-2/sam2/configs/sam2.1/sam2.1_hiera_l.yaml
    sam2_checkpoint: /app/models/dynamic/sam2.1_hiera_large.pt
    groundingdino_repo_path: /opt/GroundingDINO
    groundingdino_config: /opt/GroundingDINO/groundingdino/config/GroundingDINO_SwinT_OGC.py
    groundingdino_checkpoint: /app/models/dynamic/groundingdino_swint_ogc.pth
    groundingdino_checkpoint_min_bytes: 650000000
    groundingdino_checkpoint_md5: 075EBFA7242D913F38CB051FE1A128A2
    text_encoder_path: /app/models/dynamic/bert-base-uncased
    sam2_checkpoint_min_bytes: 850000000
    device: auto
    box_threshold: 0.3
    text_threshold: 0.25
    required_paths:
      - /app/backend/app/operators/algorithms/semantic_mask.py
      - /opt/GroundingDINO/groundingdino/config/GroundingDINO_SwinT_OGC.py
      - /app/models/dynamic/groundingdino_swint_ogc.pth
      - /app/models/dynamic/bert-base-uncased

  dynamic_mask:
    enabled: true
    queue: gpu
    ffmpeg_binary: ffmpeg
    frame_diff_max_frames: 120
    frame_diff_width: 64
    frame_diff_height: 64
    frame_diff_threshold: 28
    max_dynamic_ratio: 0.35
    # Optional semantic mask command. It must write JSON to {output_report}
    # and masks to {masks_dir}; if absent the worker uses ffmpeg frame diff.
    semantic_max_images: 180
    command:
      - "{python}"
      - "{semantic_wrapper}"
      - "--mode"
      - "dynamic"
      - "--images-dir"
      - "{images_dir}"
      - "--masks-dir"
      - "{masks_dir}"
      - "--output-report"
      - "{output_report}"
      - "--prompt"
      - "{dynamic_prompt}"
      - "--max-images"
      - "{max_images}"
      - "--max-dynamic-ratio"
      - "{max_dynamic_ratio}"
      - "--device"
      - "{device}"
      - "--box-threshold"
      - "{box_threshold}"
      - "--text-threshold"
      - "{text_threshold}"
      - "--groundingdino-repo"
      - "{groundingdino_repo_path}"
      - "--groundingdino-config"
      - "{groundingdino_config}"
      - "--groundingdino-checkpoint"
      - "{groundingdino_checkpoint}"
      - "--groundingdino-checkpoint-min-bytes"
      - "{groundingdino_checkpoint_min_bytes}"
      - "--groundingdino-checkpoint-md5"
      - "{groundingdino_checkpoint_md5}"
      - "--text-encoder-path"
      - "{text_encoder_path}"
      - "--grounded-sam2-repo"
      - "{grounded_sam2_repo_path}"
      - "--sam2-repo"
      - "{sam2_repo_path}"
      - "--sam2-config"
      - "{sam2_config}"
      - "--sam2-checkpoint"
      - "{sam2_checkpoint}"
      - "--sam2-checkpoint-min-bytes"
      - "{sam2_checkpoint_min_bytes}"

  subject_mask_generation:
    enabled: true
    queue: gpu
    # Optional external segmenter. It must write a full-resolution mask_manifest.json.
    # The built-in fallback only creates advisory low-resolution masks and does not
    # pretend to be SAM/SAM2/GroundingDINO.
    prompt: "building. structure. equipment. vehicle. object. foreground."
    semantic_max_images: 1200
    command:
      - "{python}"
      - "{semantic_wrapper}"
      - "--mode"
      - "subject"
      - "--images-dir"
      - "{images_dir}"
      - "--masks-dir"
      - "{masks_dir}"
      - "--output-manifest"
      - "{output_manifest}"
      - "--output-report"
      - "{output_report}"
      - "--prompt"
      - "{prompt}"
      - "--max-images"
      - "{max_images}"
      - "--device"
      - "{device}"
      - "--box-threshold"
      - "{box_threshold}"
      - "--text-threshold"
      - "{text_threshold}"
      - "--groundingdino-repo"
      - "{groundingdino_repo_path}"
      - "--groundingdino-config"
      - "{groundingdino_config}"
      - "--groundingdino-checkpoint"
      - "{groundingdino_checkpoint}"
      - "--groundingdino-checkpoint-min-bytes"
      - "{groundingdino_checkpoint_min_bytes}"
      - "--groundingdino-checkpoint-md5"
      - "{groundingdino_checkpoint_md5}"
      - "--text-encoder-path"
      - "{text_encoder_path}"
      - "--grounded-sam2-repo"
      - "{grounded_sam2_repo_path}"
      - "--sam2-repo"
      - "{sam2_repo_path}"
      - "--sam2-config"
      - "{sam2_config}"
      - "--sam2-checkpoint"
      - "{sam2_checkpoint}"
      - "--sam2-checkpoint-min-bytes"
      - "{sam2_checkpoint_min_bytes}"

  gaussian_pruning:
    enabled: true
    queue: export
    viewer_max_gaussians: 350000
    viewer_max_size_mb: 160

  export:
    splat_transform:
      binary: node
      output_suffix: .sog
      install_hint: npm install -g @playcanvas/splat-transform
      required_paths:
        - /opt/splat-transform/bin/cli.mjs
        - /opt/splat-transform/node_modules
      command:
        - "{binary}"
        - "/opt/splat-transform/bin/cli.mjs"
        - "-w"
        - "-g"
        - "cpu"
        - "{input_ply}"
        - "--filter-nan"
        - "{output_asset}"
    spz:
      enabled: true
      binary: node
      tool_name: splat-transform-spz
      output_filename: viewer_asset.spz
      install_hint: mount ./external/splat-transform with node_modules or install @playcanvas/splat-transform
      required_paths:
        - /opt/splat-transform/bin/cli.mjs
        - /opt/splat-transform/node_modules
      command:
        - "{binary}"
        - "/opt/splat-transform/bin/cli.mjs"
        - "-w"
        - "-g"
        - "cpu"
        - "{input_ply}"
        - "--filter-nan"
        - "{output_asset}"
    three_d_tiles:
      enabled: true
      binary: node
      tool_name: 3dgs-ply-3dtiles-converter
      install_hint: run npm install in external/3DGS-PLY-3DTiles-Converter or mount a built converter package
      required_paths:
        - /opt/3DGS-PLY-3DTiles-Converter/bin/3dgs-ply-3dtiles-converter.js
        - /opt/3DGS-PLY-3DTiles-Converter/node_modules
      command:
        - "{binary}"
        - "/opt/3DGS-PLY-3DTiles-Converter/bin/3dgs-ply-3dtiles-converter.js"
        - "{viewer_asset}"
        - "{output_dir}"
        - "--no-open-inspector"

  gaussian:
    enabled: true
    repo_path: /opt/gaussian-splatting
    python: /opt/conda/envs/gaussian/bin/python
    queue: gaussian

  nerfstudio:
    enabled: true
    binary: /usr/local/bin/ns-train
    export_binary: /usr/local/bin/ns-export
    queue: nerfstudio
    default_method: splatfacto-big
    quick_iterations: 2000
    standard_iterations: 10000
    high_iterations: 30000
    smoke_iterations: 20

capture_validation:
  enabled: true
  cpu_only: true

  decision:
    allow_leave_site_status:
      - PASSED
      - PASSED_WITH_WARNINGS
    block_reconstruction_status:
      - NEEDS_SUPPLEMENT
      - FAILED

  image:
    min_width_px: 4000
    min_height_px: 3000
    recommended_long_edge_px: 6000
    laplacian_variance_min: 100.0
    laplacian_variance_recommended: 180.0
    brightness_mean_min: 45
    brightness_mean_max: 210
    max_overexposed_ratio: 0.08
    max_underexposed_ratio: 0.08
    psnr_estimate_min: 28.0
    key_region_psnr_estimate_min: 28.0

  video:
    min_width_px: 3840
    min_height_px: 2160
    min_fps: 30
    min_bitrate_mbps: 50
    extract_fps: 1
    max_frames: 600
    min_valid_frame_ratio: 0.80
    max_blur_frame_ratio: 0.15
    max_bad_exposure_frame_ratio: 0.10
    psnr_estimate_min: 28.0

  panorama:
    min_width_px: 6000
    min_height_px: 3000
    recommended_width_px: 8000
    recommended_height_px: 4000
    tile_mode: cube
    min_tile_psnr_estimate: 28.0
    max_low_quality_tile_ratio: 0.10
    critical_tile_must_pass: true

  coverage:
    min_overall_coverage_score: 0.75
    min_key_region_coverage_score: 0.85
    min_overlap_score: 0.55
    min_forward_overlap_ratio: 0.70
    min_side_overlap_ratio: 0.60
    min_key_region_overlap_ratio: 0.80
    require_no_missing_views: true
    require_scale_reference: true
    require_transition_between_areas: true

  supplement:
    create_issues: true
    blocking_issue_types:
      - low_resolution
      - blur
      - under_exposed
      - over_exposed
      - low_psnr_estimate
      - missing_view
      - low_overlap
      - missing_scale_reference
      - pano_tile_low_quality
      - video_valid_frame_ratio_low
      - key_region_single_view
      - area_transition_missing
      - critical_occlusion

reconstruction:
  require_capture_validation: true
  allow_force_without_validation: true
  reuse_capture_validation_artifacts: true

stage_optimized_reconstruction:
  enabled: true
  preserve_forensic_integrity: true
  stop_when_stage_optimal: true
  allow_ai_enhance: false
  allow_super_resolution: false
  allow_deblur: true
  allow_denoise: true
  force_original_images: false
  allow_mask: true
  allow_splatfacto_w: true
  allow_big_model: true
  max_gpu_hours: auto
  route_preset: safe_pose_original_train
  execute_route_matrix: false
  safe_image_enhancement_routes:
    - denoise_light
    - exposure_normalized
    - deblur_light
    - contrast_local_light
    - white_balance_light
    - gamma_light
    - sharpen_light
  route_matrix:
    enabled: false
    default_routes:
      - original_pose_original_train
      - safe_pose_original_train
    benchmark_routes:
      - original_pose_original_train
      - safe_pose_original_train
    selection:
      prefer_original_training_when_close: true
      close_score_epsilon: 0.015
  image:
    min_width_px: 1200
    min_height_px: 900
    laplacian_variance_min: 80.0
    brightness_mean_min: 35
    brightness_mean_max: 220
    max_overexposed_ratio: 0.12
    max_underexposed_ratio: 0.12
    psnr_estimate_min: 26.0
    forensic_structural_change_max: 0.08
    derivative_psnr_min: 24.0
    derivative_brightness_delta_max: 25.0
  video:
    extract_fps: 1
    max_frames_per_strategy: 240
    max_keyframes_per_video: 180
    duplicate_mean_absdiff_min: 2.5
    source_balance_video_to_jpg_max_ratio: 3
  panorama:
    equirectangular_ratio_tolerance: 0.12
    perspective_fov_deg: 90
    generated_view_width_px: 1600
  dataset:
    min_pose_images: 12
    max_video_to_image_ratio: 3
    holdout_ratio: 0.08
    min_holdout_images: 4
  pose:
    min_registered_ratio: 0.60
    min_largest_component_ratio: 0.70
    max_mean_reprojection_error_px: 4.0
    min_sparse_points: 1500
  pose_attempts:
    stop_after_quality_accept: true
    accept_registered_ratio: 0.99
    accept_max_reprojection_error_px: 2.0
    accept_min_sparse_points: 10000
  mask:
    max_mask_coverage_ratio: 0.30
    max_static_structure_damage_score: 0.10
    max_feature_loss_score: 0.25
  training:
    execute_training_by_default: false
    fake_runner: false
    quick_probe_steps: 300
    standard_steps: 10000
    final_steps: 30000
    min_meaningful_gain: 0.03
  execution:
    execute_pose_estimation_by_default: false
    execute_mask_optimization_by_default: false
    execute_training_by_default: false
    execute_all_route_candidates: false
  route_catalog:
    image_enhancement:
      - original
      - denoise_light
      - deblur_light
      - exposure_normalized
      - white_balance_light
      - white_balance_normalized
      - gamma_light
      - sharpen_light
      - contrast_local_light
      - super_resolution_safe
      - combined_safe_enhance
    video_keyframe_optimization:
      - uniform_1fps
      - uniform_2fps
      - uniform_3fps
      - motion_aware
      - blur_filtered
      - exposure_stable
      - hybrid_balanced
      - hybrid_dense
      - hybrid_sparse
      - loop_aware
    panorama_normalization:
      - keep_equirectangular
      - perspective_cubemap_4
      - perspective_cubemap_6
      - perspective_views_dense
      - panorama_as_context_only
    dataset_assembly:
      - original_pose_original_train
      - safe_pose_original_train
      - jpg_only_best_pose
      - video_only_best_keyframes
      - jpg_video_fused_balanced
      - jpg_video_fused_dense
      - jpg_video_fused_sparse
      - panorama_context_added
      - high_confidence_only
      - enhanced_pose_original_texture
      - enhanced_pose_enhanced_texture
    pose_estimation:
      - colmap_exhaustive
      - colmap_sequential
      - colmap_sequential_loop
      - colmap_vocab_tree
      - colmap_hybrid
      - colmap_multi_camera_model_test
      - hloc_lightglue_aliked_fallback
      - mast3r_dust3r_fallback
    mask_optimization:
      - no_mask
      - dynamic_object_mask
      - human_vehicle_animal_mask
      - reflection_sensitive_mask
      - foreground_interference_mask
      - conservative_mask
      - aggressive_mask
    training_input:
      - original_training_images
      - enhanced_training_images
      - exposure_normalized_training_images
      - denoise_training_images
      - mixed_training_images
      - resize_native
      - resize_balanced
      - balanced_holdout_split
      - mask_safe_training_input
    gaussian_training:
      - splatfacto_baseline
      - splatfacto_tuned
      - splatfacto_big
      - splatfacto_w
      - splatfacto_with_conservative_mask
      - splatfacto_with_robust_mask
      - splatfacto_high_resolution
      - splatfacto_long_train
      - prior_assisted_fallback
    render_evaluation:
      - held_out_view_render
      - fixed_camera_path_render
      - orbit_render
      - close_up_render
      - sparse_vs_render_comparison
      - original_vs_reconstruction_comparison
      - baseline_vs_best_comparison
      - mask_vs_no_mask_comparison
      - enhanced_vs_original_comparison
  real_pose_candidates:
    - colmap_sequential
  real_training_candidates:
    - splatfacto_baseline
  adapters:
    hloc_lightglue_aliked:
      enabled: false
    mast3r_dust3r:
      enabled: false
    sam2:
      enabled: false
    super_resolution:
      enabled: false

quality:
  enable_quality_gate: true
  block_d_grade: true
  measurement_allowed_default: false

reconstruction_scope:
  reconstruction_scope: roi_first
  reconstruction_roi: auto
  preserve_context: true
  context_quality: low
  foreground_loss_weight: 1.0
  background_loss_weight: 0.15
  prune_background_gaussians: true
  export_full_debug_model: true
  publish_default: subject_model
  foreground_ratio: 0.68
  viewer_max_gaussians: 350000
  viewer_max_size_mb: 160
  apply_masks_to_colmap: false
  apply_masks_to_training: false

workspace:
  root: /workspace
  keep_failed_workspace: true
  keep_passed_workspace: false

fieldsplat_defaults_v0_1:
  ingest:
    accepted_inputs:
      images: [jpg, jpeg, png, tif, tiff]
      videos: [mp4, mov, m4v, avi]
      pano_360: [osv, insv, mp4, mov]
    storage:
      require_registered_asset: true
      preserve_original: true
      create_normalized_derivative: true

  preprocess:
    image:
      max_long_edge_px: 2400
      min_long_edge_px: 1200
      reject_blur_laplacian_lt: 80
      reject_dark_mean_luma_lt: 20
      reject_bright_mean_luma_gt: 245
      near_duplicate_ssim_gt: 0.985

    video_global:
      extract_fps: 1.5
      min_fps: 1
      max_fps: 3
      target_frames_min: 120
      target_frames_max: 700
      max_long_edge_px: 1920
      use_scene_filter: true
      scene_threshold: 0.08
      min_frame_gap_sec: 0.35
      reject_blur_laplacian_lt: 70
      near_duplicate_ssim_gt: 0.985

    video_detail:
      extract_fps: 3
      target_frames_max_per_block: 300
      max_long_edge_px: 2200
      reject_blur_laplacian_lt: 80

    osv_pano_360:
      do_not_mix_raw_pano_into_global_images: true
      generate_perspective_crops: true
      crop_fov_deg: 90
      crop_yaws_deg: [0, 60, 120, 180, 240, 300]
      crop_pitches_deg: [-30, 0, 30]
      crop_max_long_edge_px: 1800
      crop_extract_fps: 0.5
      max_pano_anchor_frames: 120
      role: pano_anchor

  routing:
    forbid_flatten_all_inputs_into_single_images_dir: true
    global_video_to_global_inputs: true
    detail_photo_to_detail_inputs: true
    pano_360_to_pano_inputs: true
    supplement_photo_to_supplement_inputs: true
    scale_marker_to_scale_inputs: true

  colmap_attempts:
    shared:
      use_gpu: false
      feature_type: SIFT
      sift_max_num_features: 8192
      sift_peak_threshold: 0.006
      sift_edge_threshold: 10
      mapper_min_num_matches: 15
      mapper_min_model_size: 10
      mapper_init_min_num_inliers: 100
      mapper_abs_pose_min_num_inliers: 30
      mapper_ba_refine_focal_length: true
      mapper_ba_refine_principal_point: false
      mapper_ba_refine_extra_params: true

    attempts:
      - name: video_sequential_opencv
        matcher: sequential
        camera_model: OPENCV
        single_camera: true
        sequential_overlap: 20

      - name: video_sequential_simple_radial
        matcher: sequential
        camera_model: SIMPLE_RADIAL
        single_camera: true
        sequential_overlap: 30

      - name: photo_exhaustive_opencv
        matcher: exhaustive
        camera_model: OPENCV
        single_camera: false

      - name: photo_exhaustive_simple_radial
        matcher: exhaustive
        camera_model: SIMPLE_RADIAL
        single_camera: false
        mapper_ba_refine_extra_params: false

      - name: photo_exhaustive_pinhole
        matcher: exhaustive
        camera_model: PINHOLE
        single_camera: false
        mapper_ba_refine_extra_params: false

      - name: photo_sequential_simple_radial
        matcher: sequential
        camera_model: SIMPLE_RADIAL
        single_camera: false
        sequential_overlap: 35
        mapper_ba_refine_extra_params: false

      - name: mixed_vocabtree_opencv
        matcher: vocabtree
        camera_model: OPENCV
        single_camera: false

  pose_quality_gate:
    hard_fail:
      registered_ratio_lt: 0.50
      sparse_points_lt: 1500
      largest_component_ratio_lt: 0.55
      mean_reprojection_error_px_gt: 6.0

    fallback:
      registered_ratio_lt: 0.65
      largest_component_ratio_lt: 0.70
      mean_reprojection_error_px_gt: 4.0

    pass_b:
      registered_ratio_gte: 0.65
      largest_component_ratio_gte: 0.70
      mean_reprojection_error_px_lte: 4.0
      sparse_points_gte: 3000

    pass_a:
      registered_ratio_gte: 0.85
      largest_component_ratio_gte: 0.85
      mean_reprojection_error_px_lte: 2.0
      sparse_points_gte: 10000

  camera_quality_gate:
    max_camera_position_jump_ratio: 6.0
    max_rotation_jump_deg: 45
    min_median_track_length: 3
    reject_camera_if_reprojection_error_px_gt: 8.0
    reject_camera_if_visible_points_lt: 50

  coverage_gate:
    min_bbox_coverage_ratio: 0.55
    min_view_angle_diversity_deg: 25
    warn_if_forward_motion_only: true
    warn_if_orbit_incomplete_deg_lt: 180

  scene_partition:
    enable_if:
      image_count_gt: 800
      registered_camera_gt: 600
      sparse_points_gt: 1500000
      bbox_diag_gt_m: 80
      connected_components_gt: 1
    cell:
      target_cameras_per_cell: 250
      max_cameras_per_cell: 450
      overlap_cameras: 40
      min_sparse_points_per_cell: 5000

  training:
    nerfstudio_splatfacto:
      smoke:
        max_num_iterations: 20
      quick_preview:
        max_num_iterations: 2000
      standard:
        max_num_iterations: 10000
      high_quality:
        max_num_iterations: 30000
      forensic_max_quality:
        max_num_iterations: 60000
        train_cameras_sampling_strategy: fps
        camera_res_scale_factor: 1.0
        warmup_length: 500
        refine_every: 100
        num_downscales: 2
        resolution_schedule: 3000
        stage1_downscale: 4
        stage2_downscale: 2
        stage3_downscale: 1
        sh_degree: 3
        ssim_lambda: 0.2
        cull_alpha_thresh: 0.005
        cull_scale_thresh: 0.5
        cull_screen_size: 0.15
        split_screen_size: 0.05
        use_absgrad: true
        max_gauss_ratio: 10
        rasterize_mode: classic
        color_corrected_metrics: true
        densify_grad_thresh: 0.001
        densify_from_iter: 500
        densify_until_iter: 10000
        stop_split_at: 10000
        stop_screen_size_at: 4000
        opacity_reset_interval: 3000
        cache_images: cpu
        camera_optimizer_mode: SO3xR3
        use_scale_regularization: true
        use_bilateral_grid: true
      forensic_in_the_wild:
        max_num_iterations: 60000
        cache_images: cpu
        camera_res_scale_factor: 1.0
        warmup_length: 500
        refine_every: 100
        num_downscales: 2
        resolution_schedule: 3000
        cull_alpha_thresh: 0.005
        cull_scale_thresh: 0.5
        cull_screen_size: 0.15
        split_screen_size: 0.05
        continue_cull_post_densification: false
        densify_grad_thresh: 0.001
        stop_split_at: 10000
        stop_screen_size_at: 4000
        opacity_reset_interval: 3000
        sh_degree: 3
        ssim_lambda: 0.2
        max_gauss_ratio: 10
        rasterize_mode: classic
        use_scale_regularization: true
        camera_optimizer_mode: SO3xR3
        appearance_embed_dim: 48
        app_num_layers: 3
        app_layer_width: 256
        appearance_features_dim: 72
        enable_alpha_loss: true
        enable_robust_mask: true
        robust_mask_percentage: [0.0, 0.4]
        never_mask_upper: 0.4
        start_robust_mask_at: 6000
        bg_sh_degree: 4
        use_avg_appearance: false

      default_mode: standard
      use_scale_regularization: true
      cull_alpha_thresh: 0.005
      continue_cull_post_densification: false
      eval_num_images_to_sample_from: 32
      eval_num_times_to_repeat_images: 1

    route_selection:
      default: route_001_colmap_splatfacto
      large_scene: route_002_colmap_splatfacto_chunked
      weak_colmap: route_003_mast3r_sfm_splatfacto
      sparse_local: route_004_instantsplatpp_sparse_local

  gaussian_quality_gate:
    hard_fail:
      missing_ply: true
      gaussian_count_lt: 50000
      has_nan_or_inf: true
      bbox_diag_over_camera_extent_gt: 6.0

    scale_outlier_cleanup:
      enabled: true
      scale_p99_over_p50_gt: 80
      scale_max_over_p50_gt: 300
      scale_outlier_ratio_gt: 0.03
      low_opacity_percentile: 25
      median_multiplier: 80
      p95_multiplier: 2
      shrink_high_opacity: true

    warn:
      gaussian_count_gt: 8000000
      scale_p99_over_p50_gt: 40
      scale_max_over_p50_gt: 150
      scale_outlier_ratio_gt: 0.01
      bbox_diag_over_camera_extent_gt: 4.0

    diagnostics_required:
      - gaussian_count
      - bbox_diag
      - camera_extent
      - scale_p50
      - scale_p95
      - scale_p99
      - scale_max
      - scale_p99_over_p50
      - scale_max_over_p50
      - scale_outlier_ratio
      - opacity_p50
      - opacity_p99

  repair_retry:
    enabled: true
    max_retries: 5
    on_splat_scale_outliers:
      - retry_with_second_best_colmap_attempt
      - prune_bad_cameras_and_retrain
      - crop_sparse_bbox_p1_p99_and_retrain
      - train_chunked
      - reduce_training_to_quick_preview_for_diagnosis

    prune_bad_cameras:
      remove_reprojection_error_px_gt: 8.0
      remove_visible_points_lt: 50
      remove_isolated_cameras: true
      min_registered_ratio_after_prune: 0.60

    bbox_crop:
      sparse_percentile_min: 1
      sparse_percentile_max: 99
      expand_ratio: 1.15

  render_quality_gate:
    holdout_ratio: 0.08
    min_holdout_images: 8
    max_holdout_images: 32
    min_psnr:
      smoke: 0
      quick_preview: 10
      standard: 14
      high_quality: 18
    fail_if_viewer_load_fails: true
    fail_if_black_frame_ratio_gt: 0.20
    warn_if_floaters_visible_proxy_gt: 0.15

  measurement_gate:
    measurement_allowed_requires:
      quality_grade: A
      scale_constraint: true
      camera_quality_pass: true
      gaussian_quality_pass: true
    scale_marker:
      min_markers: 1
      max_scale_error_ratio: 0.03

  publish:
    D:
      create_version: false
      diagnostics_only: true
    C:
      create_version: false
      internal_preview_only: true
    B:
      create_version: true
      measurement_allowed: false
    A:
      create_version: true
      measurement_allowed: true
